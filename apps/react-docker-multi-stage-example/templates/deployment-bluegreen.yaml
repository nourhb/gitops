{{- if eq (.Values.deploymentStrategy | default "Rolling") "BlueGreen" }}
{{- $root := . }}
{{- range $slot := list "blue" "green" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "react-docker-multi-stage-example.fullname" $root }}-{{ $slot }}
  labels:
    app.kubernetes.io/name: {{ include "react-docker-multi-stage-example.name" $root }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    paas.io/slot: {{ $slot }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "react-docker-multi-stage-example.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      paas.io/slot: {{ $slot }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "react-docker-multi-stage-example.name" $root }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        paas.io/slot: {{ $slot }}
    spec:
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ include "react-docker-multi-stage-example.name" $root }}
          {{- $slotImg := index $root.Values $slot | default dict }}
          {{- $slotImage := $slotImg.image | default dict }}
          {{- $repo := $slotImage.repository | default $root.Values.image.repository }}
          image: "{{ $repo }}{{- if $slotImage.digest }}@{{ $slotImage.digest }}{{- else if $slotImage.tag }}:{{ $slotImage.tag }}{{- else if $root.Values.image.tag }}:{{ $root.Values.image.tag }}{{- else }}:latest{{- end }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: {{ $root.Values.service.targetPort | default 3000 }}
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: {{ $root.Values.service.targetPort | default 3000 | quote }}
            - name: PAAS_BLUE_GREEN_SLOT
              value: {{ $slot | quote }}
            {{- range $root.Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- $probes := $root.Values.probes | default dict }}
          {{- $readiness := $probes.readiness | default dict }}
          {{- $liveness := $probes.liveness | default dict }}
          readinessProbe:
            {{- if eq (default "http" $probes.type) "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ default "/" $readiness.path }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ default 5 $readiness.initialDelaySeconds }}
            periodSeconds: {{ default 10 $readiness.periodSeconds }}
            failureThreshold: {{ default 3 $readiness.failureThreshold }}
          livenessProbe:
            {{- if eq (default "http" $probes.type) "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ default "/" $liveness.path }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ default 15 $liveness.initialDelaySeconds }}
            periodSeconds: {{ default 20 $liveness.periodSeconds }}
            failureThreshold: {{ default 3 $liveness.failureThreshold }}
          {{- with $root.Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- else }}
          resources:
            limits:
              cpu: "300m"
              memory: "384Mi"
            requests:
              cpu: "50m"
              memory: "128Mi"
          {{- end }}
{{- end }}
{{- end }}
