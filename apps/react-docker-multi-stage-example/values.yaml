image:
  repository: harbor.192.168.56.129.nip.io:30002/paas/react-docker-multi-stage-example
  tag: "281"
  digest: ""
  pullPolicy: IfNotPresent
nameOverride: react-docker-multi-stage-example
fullnameOverride: paas-react-docker-multi-stage-example
imagePullSecrets:
  - name: harbor-regcred
service:
  targetPort: 8080
staticNginx: true
probes:
  type: tcp
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 6
resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 50m
    memory: 128Mi
env:
  - name: APP_BASE_URL
    value: http://react-docker-multi-stage-example.192.168.56.129.nip.io:30659
  - name: NEXT_PUBLIC_APP_URL
    value: http://react-docker-multi-stage-example.192.168.56.129.nip.io:30659
  - name: NEXT_PUBLIC_SITE_URL
    value: http://react-docker-multi-stage-example.192.168.56.129.nip.io:30659
  - name: PUBLIC_URL
    value: http://react-docker-multi-stage-example.192.168.56.129.nip.io:30659
deploymentStrategy: Rolling
ingress:
  enabled: true
  className: traefik
  hosts:
    - host: react-docker-multi-stage-example.192.168.56.129.nip.io
  tls: []
