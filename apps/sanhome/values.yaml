image:
  repository: 192.168.56.129:30002/paas/sanhome
  tag: "latest"
  digest: ""

# Required for private Harbor (kubectl create secret docker-registry harbor-regcred … -n devsecops-paas)
imagePullSecrets:
  - name: harbor-regcred

podSecurityContext:
  runAsUser: 1000

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

env: []

# Exposes the app on the same host pattern as APPS_PUBLIC_URL_TEMPLATE (nip.io → cluster ingress NodePort).
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: sanhome.192.168.56.129.nip.io
  tls: []
