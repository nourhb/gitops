image:
  repository: 192.168.56.129:30002/paas/angular-docker
  tag: '84'
  digest: ''
  pullPolicy: IfNotPresent
imagePullSecrets:
- name: harbor-regcred
service:
  targetPort: 80
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 25m
    memory: 64Mi
env:
- name: APP_BASE_URL
  value: http://angular-docker.192.168.56.129.nip.io:30659
- name: NEXT_PUBLIC_APP_URL
  value: http://angular-docker.192.168.56.129.nip.io:30659
- name: NEXT_PUBLIC_SITE_URL
  value: http://angular-docker.192.168.56.129.nip.io:30659
- name: PUBLIC_URL
  value: http://angular-docker.192.168.56.129.nip.io:30659
deploymentStrategy: Rolling
ingress:
  enabled: true
  className: traefik
  hosts:
  - host: angular-docker.192.168.56.129.nip.io
  tls: []
probes:
  type: tcp
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 6
nameOverride: angular-docker
fullnameOverride: paas-angular-docker
nodeSelector:
  kubernetes.io/hostname: master
