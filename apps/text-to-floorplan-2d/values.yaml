    cpu: 500m
    memory: 768Mi
  requests:
    cpu: 100m
    memory: 256Mi
env:
  - name: APP_BASE_URL
    value: http://text-to-floorplan-2d.192.168.56.129.nip.io:30659
  - name: NEXT_PUBLIC_APP_URL
    value: http://text-to-floorplan-2d.192.168.56.129.nip.io:30659
  - name: NEXT_PUBLIC_SITE_URL
    value: http://text-to-floorplan-2d.192.168.56.129.nip.io:30659
  - name: PUBLIC_URL
    value: http://text-to-floorplan-2d.192.168.56.129.nip.io:30659
ingress:
  enabled: true
  className: traefik
  hosts:
    - host: text-to-floorplan-2d.192.168.56.129.nip.io
  tls: []
deploymentStrategy: Rolling
probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 6
