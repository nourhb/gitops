nameOverride: python-fastapi-demo-docker
fullnameOverride: paas-python-fastapi-demo-docker
deploymentStrategy: Rolling
image:
  repository: 192.168.56.129:30002/paas/python-fastapi-demo-docker
  tag: '264'
  digest: ''
  pullPolicy: IfNotPresent
imagePullSecrets:
- name: harbor-regcred
service:
  targetPort: 8000
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 25m
    memory: 64Mi
probes:
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 12
  liveness:
    initialDelaySeconds: 90
    periodSeconds: 20
    failureThreshold: 6
ingress:
  enabled: true
  className: traefik
  hosts:
  - host: python-fastapi-demo-docker.192.168.56.129.nip.io
  tls: []
nodeSelector:
  kubernetes.io/hostname: master
