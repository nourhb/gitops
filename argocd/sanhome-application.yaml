apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paas-sanhome
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nourhb/gitops
    targetRevision: main
    path: apps/sanhome
  destination:
    server: https://kubernetes.default.svc
    namespace: devsecops-paas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
